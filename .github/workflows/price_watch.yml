name: Price Watch MXP→HAN

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install uv && uv sync --python 3.12
      - name: Check price and fail if under threshold
        run: |
          OUTPUT=$(uv run python -c "from fli.mcp.price_watch import run_price_watch; import json; print(json.dumps(run_price_watch()))")
          echo "Risultato: $OUTPUT"
          
          # Estrae il prezzo dal JSON (cerca un numero nel testo)
          PREZZO=$(echo $OUTPUT | grep -oE '[0-9]+' | head -n 1)
          
          echo "Prezzo rilevato: $PREZZO €"
          
          if [ "$PREZZO" -lt 700 ]; then
            echo "ALLERTA! Il prezzo è sceso sotto i 700€!"
            exit 1
          fi
